name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  attestations: write  # for build provenance attestations
  id-token: write  # for attestation signing

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-x86_64, macos-universal2, win-amd64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools-scm needs tags for versioning

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install tox shiv build

      - name: Build .pyz for ${{ matrix.platform }}
        run: tox -e standalone -- ${{ matrix.platform }}

      # .pyz files are not published (they bundle third-party code) but we
      # keep the build as a CI check.  To distribute .pyz files, build
      # locally with: tox -e standalone -- <platform>

  build-python-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools-scm needs tags for versioning

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

  release:
    needs: [build, build-python-dist]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for uploading release assets
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes

  publish-pypi:
    if: github.repository == 'microsoft/pypi-lockdown'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for PyPI trusted publishing (OIDC)
    environment: pypi
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
