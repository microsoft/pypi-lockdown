name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  attestations: write  # for build provenance attestations
  id-token: write  # for attestation signing

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-x86_64, macos-universal2, win-amd64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install tox shiv build

      - name: Build .pyz for ${{ matrix.platform }}
        run: tox -e standalone -- ${{ matrix.platform }}

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.pyz

      - uses: actions/upload-artifact@v7
        with:
          name: pyz-${{ matrix.platform }}
          path: dist/*.pyz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for uploading release assets
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: pyz-*
          merge-multiple: true
          path: dist/

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" dist/*.pyz --clobber
