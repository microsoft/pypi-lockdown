name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # for trusted publishing
  attestations: write  # for build provenance attestations

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Publish to PyPI and attach assets to the GitHub Release.
  # The release must already exist (created via `gh release create vX.Y.Z`).
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # for uploading release assets
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber

      - uses: pypa/gh-action-pypi-publish@release/v1
        if: false  # TODO: enable once trusted publishing is configured
